services:
    demalyzer-api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: demalyzer-api
        restart: unless-stopped
        ports:
            - "5622:5622"
        environment:
            PORT: 5622
            HOST: 0.0.0.0
            NODE_ENV: production
            FACEIT_CLIENT_ID: ${FACEIT_CLIENT_ID}
            FACEIT_CLIENT_SECRET: ${FACEIT_CLIENT_SECRET}
            FACEIT_REDIRECT_URI: ${FACEIT_REDIRECT_URI}
            FRONTEND_SUCCESS_URL: ${FRONTEND_SUCCESS_URL}
            FRONTEND_ERROR_URL: ${FRONTEND_ERROR_URL}
            CORS_ORIGIN: ${CORS_ORIGIN}
        volumes:
            - ./api/data:/app/data
